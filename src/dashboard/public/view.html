<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สรุปยอด — Slip Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080f; --card:rgba(16,26,46,.55); --border:rgba(120,150,220,.16);
  --text:#e9eefb; --mut:#97a6c4; --dim:#5d6b86; --acc:#3d7bff; --grn:#00d68f; --pur:#a855f7; --org:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:18px;
  background-image:radial-gradient(820px 520px at 10% -8%,rgba(61,123,255,.12),transparent 60%),radial-gradient(720px 520px at 102% 0%,rgba(168,85,247,.10),transparent 55%),radial-gradient(640px 640px at 50% 118%,rgba(0,214,143,.07),transparent 60%);}
.wrap{max-width:1000px;margin:0 auto}
h1{font-size:22px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo{font-size:26px;filter:drop-shadow(0 0 14px rgba(61,123,255,.5))}
.sub{color:var(--mut);font-size:13px;margin-bottom:18px}
.glass{background:var(--card);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border:1px solid var(--border);border-radius:16px}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.tab{padding:9px 16px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--mut);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;font-family:inherit}
.tab:hover{border-color:rgba(120,150,220,.4);color:var(--text)}
.tab.on{background:linear-gradient(135deg,rgba(61,123,255,.25),rgba(168,85,247,.18));color:#fff;border-color:rgba(61,123,255,.5);box-shadow:0 4px 16px rgba(61,123,255,.2)}
input[type=date],input[type=month]{padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(10,16,30,.6);color:var(--text);font-family:inherit;font-size:13px}
.grand{padding:22px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.grand::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(120,170,255,.6),transparent)}
.grand .lbl{color:var(--mut);font-size:13px}
.grand .big{font-size:38px;font-weight:800;letter-spacing:-1px;background:linear-gradient(90deg,#6699ff,#a855f7,#00d68f);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:sh 4s linear infinite;font-variant-numeric:tabular-nums}
@keyframes sh{to{background-position:200% center}}
.grand .meta{color:var(--mut);font-size:13px;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.acc{padding:16px 18px;cursor:pointer;transition:transform .15s,box-shadow .2s,border-color .2s}
.acc:hover{transform:translateY(-2px);border-color:rgba(61,123,255,.4);box-shadow:0 10px 28px rgba(0,0,0,.35),0 0 18px rgba(61,123,255,.18)}
.acc .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.acc .id{font-size:16px;font-weight:700}
.acc .id small{color:var(--dim);font-weight:500;font-size:12px}
.acc .cnt{font-size:11px;color:var(--mut);background:rgba(255,255,255,.06);padding:3px 9px;border-radius:999px}
.acc .tot{font-size:24px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;color:#fff}
.acc .tot small{font-size:13px;color:var(--mut);font-weight:500}
.acc .exp{margin-top:12px;border-top:1px solid var(--border);padding-top:10px;display:none;max-height:280px;overflow:auto}
.acc.open .exp{display:block}
.acc .chev{color:var(--dim);font-size:12px;transition:transform .2s}
.acc.open .chev{transform:rotate(180deg)}
.row{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;color:var(--mut);font-variant-numeric:tabular-nums;gap:8px}
.row .dt{color:var(--dim)}
.row .am{color:var(--text);font-weight:600}
.empty,.load{text-align:center;color:var(--mut);padding:40px;font-size:14px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:r .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes r{to{transform:rotate(360deg)}}
/* key overlay */
.ov{position:fixed;inset:0;background:rgba(5,8,15,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.ov .box{max-width:380px;width:100%;padding:28px;text-align:center}
.ov h2{font-size:18px;margin-bottom:6px}.ov p{color:var(--mut);font-size:13px;margin-bottom:16px}
.ov input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(10,16,30,.7);color:var(--text);font-family:inherit;font-size:14px;margin-bottom:12px}
.ov button{width:100%;padding:12px;border-radius:10px;border:0;background:var(--acc);color:#fff;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px}
.err{color:var(--org);font-size:12px;margin-top:8px;min-height:16px}
@media(max-width:600px){.grand .big{font-size:30px}h1{font-size:19px}}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="logo">📊</span> สรุปยอด</h1>
  <div class="sub">รายการธุรกรรมแยกตามบัญชี · เลือกช่วงเวลาได้</div>

  <div class="tabs" id="tabs">
    <button class="tab on" data-scope="today">วันนี้</button>
    <button class="tab" data-scope="month">เดือนนี้</button>
    <button class="tab" data-scope="all">ทั้งหมด</button>
    <input type="date" id="dpick" title="เลือกวัน">
    <input type="month" id="mpick" title="เลือกเดือน">
  </div>

  <div class="glass grand" id="grand">
    <div class="lbl">ยอดรวมทั้งหมด</div>
    <div class="big" id="gtot">—</div>
    <div class="meta" id="gmeta"></div>
  </div>

  <div id="list"><div class="load"><span class="spin"></span>กำลังโหลด…</div></div>
</div>

<div class="ov" id="ov" hidden>
  <div class="glass box">
    <h2>🔑 ใส่รหัสเข้าถึง</h2>
    <p>กรอก API key เพื่อดูยอด (จำไว้ในเครื่องนี้)</p>
    <input id="kin" type="password" placeholder="key..." autocomplete="off">
    <button onclick="saveKey()">เข้าดู</button>
    <div class="err" id="kerr"></div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
let KEY=localStorage.getItem('slip_view_key')||'';
let scope='today', curData=null;

function bkk(fmt){return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Bangkok',...fmt}).format(new Date());}
const today=()=>bkk({year:'numeric',month:'2-digit',day:'2-digit'});
const thisMonth=()=>today().slice(0,7);
const money=n=>Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0});

function qs(){
  if(scope==='today')return 'date='+today();
  if(scope==='day')return 'date='+($('#dpick').value||today());
  if(scope==='month')return 'month='+thisMonth();
  if(scope==='mon')return 'month='+($('#mpick').value||thisMonth());
  return '';
}
function label(){
  if(scope==='today')return 'วันนี้ '+today();
  if(scope==='day')return 'วันที่ '+($('#dpick').value||today());
  if(scope==='month')return 'เดือนนี้ '+thisMonth();
  if(scope==='mon')return 'เดือน '+($('#mpick').value||thisMonth());
  return 'ทั้งหมด';
}

async function load(){
  if(!KEY){$('#ov').hidden=false;return;}
  $('#list').innerHTML='<div class="load"><span class="spin"></span>กำลังโหลด…</div>';
  try{
    const r=await fetch('/api/public/transactions?group=account&key='+encodeURIComponent(KEY)+'&'+qs());
    if(r.status===401){$('#ov').hidden=false;$('#kerr').textContent='รหัสไม่ถูกต้อง';return;}
    const d=await r.json();
    if(!d.ok)throw new Error(d.error||'error');
    curData=d; render(d);
  }catch(e){$('#list').innerHTML='<div class="empty">โหลดไม่สำเร็จ: '+e.message+'</div>';}
}

function render(d){
  $('#gtot').textContent='฿'+money(d.grandTotal);
  $('#gmeta').textContent=label()+' · '+d.count+' รายการ · '+(d.accounts||[]).length+' บัญชี';
  const accs=(d.accounts||[]).slice().sort((a,b)=>b.total-a.total);
  if(!accs.length){$('#list').innerHTML='<div class="empty">ไม่มีรายการในช่วงนี้</div>';return;}
  $('#list').innerHTML='<div class="grid">'+accs.map((a,i)=>{
    const rows=a.items.slice().sort((x,y)=>(y.date+y.time).localeCompare(x.date+x.time)).map(it=>
      '<div class="row"><span class="dt">'+it.date+' '+(it.time||'')+'</span><span class="am">฿'+money(it.amount)+'</span></div>').join('');
    return '<div class="glass acc" onclick="this.classList.toggle(\'open\')">'
      +'<div class="head"><span class="id">****'+a.last4+' <small>'+a.count+' รายการ</small></span><span class="chev">▼</span></div>'
      +'<div class="tot">฿'+money(a.total)+'</div>'
      +'<div class="exp">'+rows+'</div></div>';
  }).join('')+'</div>';
}

function saveKey(){
  const v=$('#kin').value.trim();
  if(!v){$('#kerr').textContent='ใส่รหัสก่อน';return;}
  KEY=v;localStorage.setItem('slip_view_key',v);$('#ov').hidden=true;load();
}

$('#tabs').addEventListener('click',e=>{
  const b=e.target.closest('.tab');if(!b)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));b.classList.add('on');
  scope=b.dataset.scope;load();
});
$('#dpick').addEventListener('change',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));scope='day';load();});
$('#mpick').addEventListener('change',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));scope='mon';load();});

load();
</script>
</body>
</html>
